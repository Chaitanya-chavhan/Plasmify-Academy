        :root {

            --bg-card2: #1c2230;
            --text-dark: #e6edf3;
            --text-muted: #8b949e;
            --accent: #10b981;
            --accent-dim: rgba(16,185,129,0.15);
            --accent-hover: #0ea472;
            --border: rgba(255,255,255,0.08);
            --radius-lg: 18px;
            --radius-pill: 99px;
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
            --transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {

            color: var(--text-dark);

            overflow-x: hidden;
            line-height: 1.6;

        a { text-decoration: none; color: inherit; }
        button { cursor: pointer; border: none; outline: none; background: none; font-family: inherit; }
        button:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 6px; }

        /* ── Layout ── */
        .app-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1.5rem 1rem 3rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        /* ── Header ── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
            padding: 0.9rem 1.5rem;
            border-radius: var(--radius-pill);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .brand-title {
            font-size: 1.25rem;
            font-weight: 800;
            background: linear-gradient(135deg, #10b981, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
        }
        .telegram-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 0.55rem 1.1rem;
            border-radius: var(--radius-pill);
            font-weight: 600;
            font-size: 0.875rem;
            transition: var(--transition);
            box-shadow: 0 2px 12px rgba(16,185,129,0.3);
        }
        .telegram-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(16,185,129,0.4); }
        .telegram-btn svg { width:16px; height:16px; fill:white; }

        /* ── Profile ── */
        .profile-card {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1.75rem 2rem;
            border-radius: var(--radius-lg);
            background: var(--bg-card);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }
        .profile-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #10b981, #34d399, #6ee7b7);
        }
        .profile-img {
            width: 90px; height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent);
            flex-shrink: 0;
        }
        .profile-info h1 {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 0.3rem;
            letter-spacing: -0.4px;
        }
        .profile-info p { color: var(--text-muted); font-size: 0.95rem; }
        .profile-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid rgba(16,185,129,0.3);
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-pill);
            font-size: 0.78rem;
            font-weight: 600;
            margin-top: 0.5rem;
        }

        /* ── Search ── */
        .search-wrapper { position: relative; }
        .search-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-pill);
            color: var(--text-dark);
            font-size: 0.95rem;
            font-family: inherit;
            transition: var(--transition);
        }
        .search-input::placeholder { color: var(--text-muted); }

        .search-icon {
            position: absolute;
            left: 0.9rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }
        .search-icon svg { width:18px; height:18px; fill:currentColor; }

        /* ── Chapter Nav ── */
        /* ── Chapter Nav ── */
        .chapter-nav-wrapper {
            position: relative;
            width: 100%;
        }
        .chapter-nav-wrapper::before,
        .chapter-nav-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 40px;
            pointer-events: none;
            z-index: 3;
            transition: opacity 0.3s ease;
            opacity: 0;
        }
        .chapter-nav-wrapper::before {
            left: 0;
            background: linear-gradient(90deg, var(--bg-main), transparent);
        }
        .chapter-nav-wrapper::after {
            right: 0;
            background: linear-gradient(-90deg, var(--bg-main), transparent);
        }
        .chapter-nav-wrapper.can-scroll-left::before {
            opacity: 1;
        }
        .chapter-nav-wrapper.can-scroll-right::after {
            opacity: 1;
        }
        .chapter-nav {
            position: relative;
            display: flex;
            gap: 0.6rem;
            overflow-x: auto;
            padding: 0.35rem 0.25rem 0.6rem;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .chapter-nav::-webkit-scrollbar { display: none; }
        .nav-indicator {
            position: absolute;
            top: 0.35rem;
            left: 0;
            height: calc(100% - 0.95rem);
            background: var(--accent);
            border-radius: var(--radius-pill);
            box-shadow: 0 0 16px rgba(16,185,129,0.35);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
            pointer-events: none;
        }
        .chapter-btn {
            position: relative;
            z-index: 2;
            padding: 0.6rem 1.25rem;
            border-radius: var(--radius-pill);
            background: transparent;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            border: 1px solid var(--border);
            white-space: nowrap;
            transition: color 0.3s ease, border-color 0.3s ease;
            flex-shrink: 0;
        }
        .chapter-btn.active {
            color: white;
            border-color: transparent;
        }
        .chapter-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

        /* ── Section Header ── */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 0.25rem;
        }
        .section-title { font-weight: 700; font-size: 1rem; color: var(--text-dark); }
        .lecture-count {
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid rgba(16,185,129,0.25);
            padding: 0.2rem 0.6rem;
            border-radius: var(--radius-pill);
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* ── Lecture Grid ── */
        .lecture-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.75rem;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .lecture-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 1rem 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
            transition: var(--transition);
            border: 1px solid var(--border);
            text-align: left;
            width: 100%;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .lecture-card:hover { transform: translateY(-3px); border-color: var(--accent); background: var(--bg-card2); box-shadow: 0 8px 24px rgba(16,185,129,0.12); }
        .lecture-card.active-lecture { border-color: var(--accent); background: var(--accent-dim); }
        .lecture-left { display: flex; align-items: center; gap: 0.75rem; flex: 1; min-width: 0; }
        .lecture-num {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent);
            background: var(--accent-dim);
            width: 28px; height: 28px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .lecture-title {
            font-size: 0.88rem;
            font-weight: 600;
            line-height: 1.4;
            color: var(--text-dark);
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .play-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--bg-main);
            border: 1px solid var(--border);
            display: flex; justify-content: center; align-items: center;
            color: var(--text-muted);
            transition: var(--transition);
            flex-shrink: 0;
        }
        .lecture-card:hover .play-btn { background: var(--accent); color: white; border-color: var(--accent); transform: scale(1.1); }
        .play-btn svg { width: 16px; height: 16px; fill: currentColor; margin-left: 2px; }

        /* ── No Results ── */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }

        /* ── Modal ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            opacity: 0;
            pointer-events: none;
            backdrop-filter: blur(0px);
            transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1), backdrop-filter 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modal-overlay.open {
            background: rgba(0,0,0,0.92);
            opacity: 1;
            pointer-events: auto;
            backdrop-filter: blur(8px);
        }
        .modal-inner {
            width: 100%;
            max-width: 960px;
            margin: auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            padding: 0.5rem 0;
            transform: translateY(30px) scale(0.97);
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-overlay.open .modal-inner {
            transform: translateY(0) scale(1);
            opacity: 1;
        }
        .modal-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }
        .modal-info { flex: 1; }
        .modal-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            margin-bottom: 0.25rem;
        }
        .modal-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-dark);
            line-height: 1.4;
        }
        .modal-close {
            background: rgba(255,255,255,0.1);
            color: white;
            width: 38px; height: 38px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.3rem;
            transition: var(--transition);
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .modal-close:hover { background: #ef4444; border-color: #ef4444; transform: scale(1.1); }
        .video-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid rgba(16,185,129,0.3);
            box-shadow: 0 0 60px rgba(16,185,129,0.15);
            position: relative;
        }
        .video-container iframe,
        .video-container video { width: 100%; height: 100%; display: block; border: none; }
        .video-loader {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            z-index: 2;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(16,185,129,0.3);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Modal Nav ── */
        .modal-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
        }
        .nav-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-dark);
            padding: 0.6rem 1.1rem;
            border-radius: var(--radius-pill);
            font-size: 0.85rem;
            font-weight: 600;
            transition: var(--transition);
        }
        .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
        .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .nav-btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .nav-counter { font-size: 0.82rem; color: var(--text-muted); font-weight: 500; }

        /* ── Footer ── */
        .footer {
            text-align: center;
            padding: 1.5rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
            margin-top: 1rem;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .app-container { padding: 1rem 0.75rem 2.5rem; gap: 1rem; }
            .header { padding: 0.75rem 1rem; }
            .brand-title { font-size: 1.1rem; }
            .telegram-btn { padding: 0.5rem 0.9rem; font-size: 0.82rem; }
            .profile-card { flex-direction: column; text-align: center; padding: 1.25rem 1rem; gap: 1rem; }
            .profile-img { width: 75px; height: 75px; }
            .profile-info h1 { font-size: 1.35rem; }
            .lecture-grid { grid-template-columns: 1fr; gap: 0.6rem; }
            .modal-inner { padding: 0; }
            .modal-title { font-size: 0.95rem; }
            .nav-btn span { display: none; }
        }
        @media (max-width: 480px) {
            .profile-info h1 { font-size: 1.2rem; }
            .chapter-btn { padding: 0.5rem 1rem; font-size: 0.8rem; }
        }
        @media (min-width: 1024px) {
            .lecture-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>

        let currentChapterIndex = 0;
        let currentLectureIndex = -1;
        let searchQuery = '';

        function getFilteredLectures() {
            const lectures = teacherData[currentChapterIndex].lectures;
            if (!searchQuery) return lectures;
            return lectures.filter(l => l.title.toLowerCase().includes(searchQuery.toLowerCase()));
        }

        function updateIndicator() {
            const activeBtn = document.querySelector('.chapter-btn.active');
            const indicator = document.getElementById('nav-indicator');
            if (activeBtn && indicator) {
                indicator.style.left = `${activeBtn.offsetLeft}px`;
                indicator.style.width = `${activeBtn.offsetWidth}px`;
                indicator.style.height = `${activeBtn.offsetHeight}px`;
                indicator.style.top = `${activeBtn.offsetTop}px`;
            }
        }

        function updateScrollIndicators() {
            const nav = document.getElementById('chapter-nav');
            const wrapper = nav.parentElement;
            if (!nav || !wrapper) return;
            
            const scrollLeft = nav.scrollLeft;
            const maxScroll = nav.scrollWidth - nav.clientWidth;
            
            if (scrollLeft > 5) {
                wrapper.classList.add('can-scroll-left');
            } else {
                wrapper.classList.remove('can-scroll-left');
            }
            
            if (scrollLeft < maxScroll - 5) {
                wrapper.classList.add('can-scroll-right');
            } else {
                wrapper.classList.remove('can-scroll-right');
            }
        }

        function renderApp() {
            // Render chapter nav buttons once
            const nav = document.getElementById('chapter-nav');
            nav.innerHTML = `
                <div class="nav-indicator" id="nav-indicator"></div>
                ${teacherData.map((chap, i) => `
                    <button class="chapter-btn ${i === currentChapterIndex ? 'active' : ''}"
                        role="tab" aria-selected="${i === currentChapterIndex}"
                        onclick="setChapter(${i})">${chap.chapter}</button>
                `).join('')}
            `;
            
            renderGrid();
            
            setTimeout(() => {
                updateIndicator();
                updateScrollIndicators();
            }, 50);
        }

        function renderGrid() {
            const lectures = getFilteredLectures();
            const grid = document.getElementById('lecture-grid');
            document.getElementById('section-title').textContent = teacherData[currentChapterIndex].chapter;
            document.getElementById('lecture-count').textContent = `${lectures.length} Lecture${lectures.length !== 1 ? 's' : ''}`;

            if (lectures.length === 0) {
                grid.innerHTML = `<div class="no-results" role="status">
                    <p style="color:var(--text-muted)">No lectures found for "<strong>${searchQuery}</strong>"</p>
                </div>`;
                return;
            }

            grid.innerHTML = lectures.map((lec, i) => {
                const origIndex = teacherData[currentChapterIndex].lectures.indexOf(lec);
                const num = origIndex + 1;
                const delay = Math.min(i * 0.03, 0.4);
                return `<button class="lecture-card ${origIndex === currentLectureIndex ? 'active-lecture' : ''}"
                    role="listitem"
                    style="animation-delay: ${delay}s;"
                    onclick="openVideo(${origIndex})"
                    aria-label="Play: ${lec.title.replace(/"/g, '&quot;')}">
                    <div class="lecture-left">
                        <div class="lecture-num" aria-hidden="true">${num}</div>
                        <span class="lecture-title">${lec.title}</span>
                    </div>
                    <div class="play-btn" aria-hidden="true">
                        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </div>
                </button>`;
            }).join('');
        }

        function setChapter(index) {
            currentChapterIndex = index;
            currentLectureIndex = -1;
            document.getElementById('search-input').value = '';
            searchQuery = '';
            
            // Toggle active classes
            const buttons = document.querySelectorAll('.chapter-btn');
            buttons.forEach((btn, i) => {
                if (i === index) {
                    btn.classList.add('active');
                    btn.setAttribute('aria-selected', 'true');
                    btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                } else {
                    btn.classList.remove('active');
                    btn.setAttribute('aria-selected', 'false');
                }
            });

            updateIndicator();
            renderGrid();
        }

        function openVideo(lectureIndex) {
            currentLectureIndex = lectureIndex;
            const lec = teacherData[currentChapterIndex].lectures[lectureIndex];
            const modal = document.getElementById('video-modal');
            const container = document.getElementById('video-container');
            const loader = document.getElementById('video-loader');

            document.getElementById('modal-title').textContent = lec.title;
            modal.classList.add('open');
            document.body.style.overflow = 'hidden';

            // Show loader
            loader.style.display = 'flex';
            container.querySelector('iframe, video')?.remove();

            updateNavButtons();
            renderGrid();

            const total = teacherData[currentChapterIndex].lectures.length;
            document.getElementById('nav-counter').textContent = `${lectureIndex + 1} / ${total}`;

            if (lec.url.includes('youtube.com') || lec.url.includes('youtu.be')) {
                const videoId = lec.url.includes('v=')
                    ? lec.url.split('v=')[1].split('&')[0]
                    : lec.url.split('/').pop().split('?')[0];

                const embedUrl = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1&iv_load_policy=3&color=white&playsinline=1`;
                const iframe = document.createElement('iframe');
                iframe.src = embedUrl;
                iframe.width = '100%'; iframe.height = '100%';
                iframe.allow = 'autoplay; fullscreen; picture-in-picture';
                iframe.setAttribute('allowfullscreen', '');
                iframe.setAttribute('frameborder', '0');
                iframe.onload = () => { loader.style.display = 'none'; };
                container.appendChild(iframe);
            } else {
                const video = document.createElement('video');
                video.src = lec.url;
                video.controls = true;
                video.autoplay = true;
                video.width = '100%';
                video.height = '100%';
                video.setAttribute('controlsList', 'nodownload');
                video.style.display = 'block';
                video.onloadeddata = () => { loader.style.display = 'none'; };
                video.onerror = () => { loader.style.display = 'none'; };
                container.appendChild(video);
            }

            modal.focus();
        }

        function updateNavButtons() {
            const total = teacherData[currentChapterIndex].lectures.length;
            document.getElementById('prev-btn').disabled = currentLectureIndex <= 0;
            document.getElementById('next-btn').disabled = currentLectureIndex >= total - 1;
        }

        function navigateLecture(direction) {
            const newIndex = currentLectureIndex + direction;
            const total = teacherData[currentChapterIndex].lectures.length;
            if (newIndex >= 0 && newIndex < total) openVideo(newIndex);
        }

        function closeVideo() {
            const modal = document.getElementById('video-modal');
            const container = document.getElementById('video-container');
            modal.classList.remove('open');
            document.body.style.overflow = '';
            
            // Stop media after close fade animation finishes
            setTimeout(() => {
                if (!modal.classList.contains('open')) {
                    const iframe = container.querySelector('iframe');
                    const video = container.querySelector('video');
                    if (iframe) iframe.src = '';
                    if (video) { video.pause(); video.src = ''; video.remove(); }
                }
            }, 350);
            
            currentLectureIndex = -1;
            renderGrid();
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            const modal = document.getElementById('video-modal');
            if (!modal.classList.contains('open')) return;
            if (e.key === 'Escape') closeVideo();
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); navigateLecture(1); }
            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); navigateLecture(-1); }
        });

        // Click backdrop to close
        document.getElementById('video-modal').addEventListener('click', function(e) {
            if (e.target === this) closeVideo();
        });

        // Search
        document.getElementById('search-input').addEventListener('input', function() {
            searchQuery = this.value.trim();
            renderGrid();
        });

        document.addEventListener('DOMContentLoaded', () => {
            renderApp();
            
            const nav = document.getElementById('chapter-nav');
            if (nav) {
                nav.addEventListener('scroll', updateScrollIndicators);
            }
            window.addEventListener('resize', () => {
                updateIndicator();
                updateScrollIndicators();
            });
        });
    </script>
